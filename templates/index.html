<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ClearCut — Background Remover</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c8f542;
      --accent-dim: #a3cc2e;
      --text: #f0f0f0;
      --muted: #666;
      --card: #1a1a1a;
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem;
    }

    header {
      text-align: center;
      margin-bottom: 3.5rem;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -2px;
      color: var(--text);
      line-height: 1;
    }

    .logo span { color: var(--accent); }

    .sub {
      margin-top: 0.6rem;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 640px;
      padding: 2rem;
    }

    .drop-zone {
      border: 1.5px dashed var(--border);
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(200, 245, 66, 0.03);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      font-size: 2.2rem;
      margin-bottom: 1rem;
    }

    .drop-label {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .drop-label strong {
      display: block;
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 0.3rem;
    }

    #preview-section {
      display: none;
      margin-top: 1.5rem;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .preview-box {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .preview-box label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }

    .preview-box img {
      width: 100%;
      height: 180px;
      object-fit: contain;
      display: block;
      background: repeating-conic-gradient(#222 0% 25%, #1a1a1a 0% 50%) 0 0 / 20px 20px;
    }

    .btn {
      display: block;
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.9rem;
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      border-radius: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.88rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:hover { background: var(--accent-dim); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #333; color: var(--muted); cursor: not-allowed; }

    .download-btn {
      display: none;
      margin-top: 0.8rem;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
    }

    .download-btn:hover { background: rgba(200,245,66,0.06); }

    #status {
      margin-top: 1rem;
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      min-height: 1.2rem;
    }

    .status-processing { color: var(--accent) !important; }
    .status-error { color: #ff6b6b !important; }

    .tag-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 2.5rem;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.7rem;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 100px;
      letter-spacing: 0.05em;
    }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid transparent;
      border-top-color: #0d0d0d;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header>
    <div class="logo">Clear<span>Cut</span></div>
    <p class="sub">AI-powered background removal &mdash; instant &amp; free</p>
  </header>

  <div class="card">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/*" />
      <div class="drop-icon">⬆</div>
      <div class="drop-label">
        <strong>Drop your image here</strong>
        or click to browse &mdash; PNG, JPG, WEBP supported
      </div>
    </div>

    <div id="preview-section">
      <div class="preview-grid">
        <div class="preview-box">
          <label>Original</label>
          <img id="original-preview" src="" alt="Original" />
        </div>
        <div class="preview-box">
          <label>Result</label>
          <img id="result-preview" src="" alt="Result" />
        </div>
      </div>
    </div>

    <p id="status"></p>

    <button class="btn" id="processBtn" disabled>Remove Background</button>
    <a class="download-btn btn" id="downloadBtn" download="no_background.png">↓ Download PNG</a>
  </div>

  <div class="tag-row">
    <span class="tag">powered by rembg</span>
    <span class="tag">deployed on render</span>
    <span class="tag">flask + python</span>
    <span class="tag">computer vision</span>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusEl = document.getElementById('status');
    const previewSection = document.getElementById('preview-section');
    const originalPreview = document.getElementById('original-preview');
    const resultPreview = document.getElementById('result-preview');

    let selectedFile = null;

    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });

    function handleFile(file) {
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        originalPreview.src = e.target.result;
        resultPreview.src = '';
        previewSection.style.display = 'block';
        downloadBtn.style.display = 'none';
        statusEl.textContent = `Ready — ${file.name}`;
        statusEl.className = '';
        processBtn.disabled = false;
      };
      reader.readAsDataURL(file);
    }

    processBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      processBtn.disabled = true;
      processBtn.innerHTML = '<span class="spinner"></span>Processing...';
      statusEl.textContent = 'Removing background, this may take 5–15 seconds...';
      statusEl.className = 'status-processing';
      downloadBtn.style.display = 'none';

      const formData = new FormData();
      formData.append('image', selectedFile);

      try {
        const res = await fetch('/remove-bg', { method: 'POST', body: formData });
        if (!res.ok) throw new Error('Server error');

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        resultPreview.src = url;
        downloadBtn.href = url;
        downloadBtn.style.display = 'block';
        statusEl.textContent = 'Done! Background removed successfully.';
        statusEl.className = '';
      } catch (err) {
        statusEl.textContent = 'Something went wrong. Try again.';
        statusEl.className = 'status-error';
      } finally {
        processBtn.innerHTML = 'Remove Background';
        processBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
